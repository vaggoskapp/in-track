<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aston Kartin Dash - Fixed Layout</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body, html {
            background-color: #000; color: #fff; margin: 0; padding: 0;
            height: 100%; width: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Arial Black', sans-serif; overflow: hidden;
        }

        #config {
            position: absolute; top: 0; width: 100%; background: #111; padding: 10px;
            display: flex; justify-content: center; gap: 8px; z-index: 100;
        }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 90px; }
        .btn { border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        /* Stint Timer */
        #stintBox { position: absolute; top: 50px; left: 15px; text-align: left; z-index: 10; }
        #stintLabel { font-size: 12px; color: #444; }
        #stintTimer { font-size: 25px; color: #ffc107; font-family: 'monospace'; }

        /* Θέση */
        #posDisp { position: absolute; top: 45px; right: 15px; font-size: 40px; color: #fff; opacity: 0.4; z-index: 10; }

        /* Gaps */
        .gap { font-size: 8vw; font-family: 'Courier New', monospace; font-weight: bold; transition: color 0.3s ease; }
        #gapAhead { margin-bottom: -5px; color: #666; } 
        #gapBehind { margin-top: -5px; color: #666; }

        /* Main Lap Time */
        #lastTime {
            font-size: 30vw; line-height: 0.85; margin: 0; color: #28a745;
            white-space: nowrap; letter-spacing: -3px;
        }

        #status { font-size: 12px; text-transform: uppercase; color: #222; margin-top: 5px; }
        #driverNameDisp { position: absolute; bottom: 10px; left: 15px; font-size: 12px; color: #111; }
        #resetStintBtn { position: absolute; bottom: 10px; right: 10px; background: #111; color: #444; font-size: 10px; border: 1px solid #222; z-index: 101; }

        /* LANDSCAPE FIX: Εδώ διορθώνουμε το overlap */
        @media screen and (orientation: landscape) {
            #lastTime { font-size: 52vh; } /* Μειώθηκε λίγο για να μην "καπελώνει" τα Gaps */
            .gap { font-size: 10vh; }
            
            #stintBox { top: 10px; left: 10px; }
            #stintTimer { font-size: 10vh; }
            #stintLabel { font-size: 3vh; }

            #posDisp { top: 5px; right: 10px; font-size: 12vh; }
            
            #resetStintBtn { bottom: 5px; right: 5px; padding: 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="config">
        <input type="text" id="track" value="speedforce">
        <input type="text" id="team" value="Aston Kartin">
        <button id="startBtn" class="btn" style="background:#28a745; color:white;">START</button>
    </div>

    <div id="stintBox">
        <div id="stintLabel">STINT</div>
        <div id="stintTimer">00:00</div>
    </div>

    <div id="posDisp">P--</div>

    <div id="dashContainer" style="display:flex; flex-direction:column; align-items:center;">
        <div id="gapAhead" class="gap">--.--</div>
        <div id="lastTime">00.000</div>
        <div id="gapBehind" class="gap">--.--</div>
    </div>

    <div id="status">READY</div>
    <div id="driverNameDisp">---</div>
    <button id="resetStintBtn" class="btn" onclick="resetStint()">RESET STINT</button>

    <video id="noSleepVideo" loop playsinline muted style="display:none;">
        <source src="https://raw.githubusercontent.com/anars/NoSleep.js/master/media/blank.mp4" type="video/mp4">
    </video>

    <script>
        let trackName = "";
        let teamName = "";
        const PROXY_URL = "https://corsproxy.io/?";
        let stintStartTime = null;
        let lastGapAhead = null;
        let lastGapBehind = null;

        document.getElementById('startBtn').addEventListener('click', function() {
            trackName = document.getElementById('track').value.trim();
            teamName = document.getElementById('team').value.trim();
            document.getElementById('config').style.display = "none";
            document.getElementById('noSleepVideo').play();
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
            update();
            setInterval(update, 1500);
            setInterval(() => {
                if (stintStartTime) {
                    const diff = Math.floor((Date.now() - stintStartTime) / 1000);
                    const mins = Math.floor(diff / 60).toString().padStart(2, '0');
                    const secs = (diff % 60).toString().padStart(2, '0');
                    document.getElementById('stintTimer').innerText = `${mins}:${secs}`;
                }
            }, 1000);
        });

        function resetStint() { stintStartTime = Date.now(); }

        async function update() {
            const timestamp = Date.now();
            const targetUrl = `https://live.racefacer.com/ajax/live-data?slug=${trackName}&nocache=${timestamp}`;
            
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(targetUrl));
                const data = await response.json();
                const runners = data.data.runs;
                const myIndex = runners.findIndex(p => p.name.toLowerCase().includes(teamName.toLowerCase()));

                if (myIndex !== -1) {
                    const myData = runners[myIndex];
                    const myTotalRaw = parseFloat(myData.total_time_raw);
                    
                    document.getElementById('lastTime').innerText = myData.last_time || "0.000";
                    document.getElementById('posDisp').innerText = `P${myIndex + 1}`;
                    document.getElementById('driverNameDisp').innerText = myData.name;
                    
                    // Gap Ahead Logic
                    const gapAheadEl = document.getElementById('gapAhead');
                    if (myIndex > 0) {
                        const aheadRaw = parseFloat(runners[myIndex - 1].total_time_raw);
                        const currentGapAhead = myTotalRaw - aheadRaw;
                        gapAheadEl.innerText = `+${currentGapAhead.toFixed(2)}`;
                        if (lastGapAhead !== null) {
                            gapAheadEl.style.color = currentGapAhead < lastGapAhead ? "#28a745" : "#ffc107";
                        }
                        lastGapAhead = currentGapAhead;
                    } else {
                        gapAheadEl.innerText = "LEADER";
                        gapAheadEl.style.color = "#fff";
                    }

                    // Gap Behind Logic
                    const gapBehindEl = document.getElementById('gapBehind');
                    if (myIndex < runners.length - 1) {
                        const behindRaw = parseFloat(runners[myIndex + 1].total_time_raw);
                        const currentGapBehind = behindRaw - myTotalRaw;
                        gapBehindEl.innerText = `+${currentGapBehind.toFixed(2)}`;
                        if (lastGapBehind !== null) {
                            gapBehindEl.style.color = currentGapBehind > lastGapBehind ? "#28a745" : "#ffc107";
                        }
                        lastGapBehind = currentGapBehind;
                    } else {
                        gapBehindEl.innerText = "LAST";
                        gapBehindEl.style.color = "#fff";
                    }

                    const isPit = myData.in_pit || String(myData.run_status).toLowerCase() === 'pit';
                    document.getElementById('status').innerText = isPit ? "IN PIT" : "LIVE LAP";
                    document.getElementById('lastTime').style.color = isPit ? "#333" : "#28a745";
                }
            } catch (e) { console.log("error"); }
        }
    </script>
</body>
</html>
