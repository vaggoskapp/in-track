<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aston Kartin Dash - Auto-Lowercase</title>
    <style>
        body, html { background-color: #000; color: #fff; margin: 0; padding: 0; height: 100%; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        /* Config Bar */
        #config { position: absolute; top: 0; width: 100%; background: #111; padding: 10px; display: flex; justify-content: center; gap: 10px; z-index: 200; }
        .setup-btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; width: 130px; font-size: 12px; text-align: center; cursor: pointer; }
        
        /* Modal Overlay */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-title { font-size: 20px; color: #28a745; margin-bottom: 20px; }
        .option-btn { background: #333; color: white; border: 1px solid #555; padding: 15px; margin: 5px; width: 100%; max-width: 300px; border-radius: 8px; font-size: 16px; font-weight: bold; }

        /* Dashboard UI */
        #stintBox { position: absolute; top: 15px; left: 15px; text-align: left; z-index: 10; }
        #stintTimer { font-size: 22px; color: #ffc107; font-family: 'monospace'; font-weight: bold; }
        #posDisp { position: absolute; top: 15px; right: 15px; font-size: 35px; color: #fff; font-weight: bold; z-index: 10; }
        
        #dashContainer { display: flex; flex-direction: column; align-items: center; width: 100%; height: 80vh; justify-content: center; }
        .gap { font-size: 9vw; font-family: 'Courier New', monospace; font-weight: bold; margin: 0; }
        #gapAhead { color: #666; }
        #gapBehind { color: #666; }
        #lastTime { font-size: 32vw; line-height: 0.8; margin: 10px 0; color: #28a745; white-space: nowrap; letter-spacing: -2px; }
        
        #driverNameDisp { position: absolute; bottom: 8px; left: 12px; font-size: 11px; color: #444; text-transform: uppercase; }
        #stintBtn { position: absolute; bottom: 15px; right: 15px; background: #007bff; color: #fff; font-size: 14px; border: none; display: none; z-index: 101; padding: 15px 25px; border-radius: 8px; font-weight: bold; }
        
        @media screen and (orientation: landscape) { 
            #stintBox { top: 4%; left: 3%; }
            #stintTimer { font-size: 9vh; }
            #posDisp { top: 4%; right: 3%; font-size: 11vh; }
            #dashContainer { height: 90vh; padding-top: 5vh; }
            #gapAhead { font-size: 10vh; margin-bottom: -2vh; }
            #lastTime { font-size: 55vh; }
            #gapBehind { font-size: 10vh; margin-top: -2vh; }
        }
    </style>
</head>
<body>

    <div id="config">
        <div id="trackSelect" class="setup-btn" onclick="openModal('track')">Track: speedforce2</div>
        <div id="teamSelect" class="setup-btn" onclick="openModal('team')">ASTON KARTIN</div>
        <button id="startDashBtn" style="background:#28a745; border:none; color:white; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">START</button>
    </div>

    <div id="modalOverlay">
        <div class="modal-title" id="modalTitle">Select Option</div>
        <div id="optionsContainer" style="width: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto;"></div>
        <input type="text" id="customInput" placeholder="Type name or team..." style="width: 280px; padding: 15px; border-radius: 8px; border: 1px solid #555; background: #222; color: #fff; margin-bottom: 10px; font-size: 16px;">
        <button style="background: #28a745; color: white; border:none; padding:15px 30px; border-radius:8px; font-weight:bold;" onclick="saveCustom()">SEARCH CUSTOM</button>
        <button style="margin-top: 15px; background: #444; color: white; border:none; padding:10px 20px; border-radius:5px;" onclick="closeModal()">CANCEL</button>
    </div>

    <div id="stintBox">
        <div style="font-size:10px; color:#555; font-weight:bold;">STINT</div>
        <div id="stintTimer">00:00</div>
    </div>
    <div id="posDisp">P--</div>

    <div id="dashContainer">
        <div id="gapAhead" class="gap">--.--</div>
        <div id="lastTime">0.000</div>
        <div id="gapBehind" class="gap">--.--</div>
    </div>

    <div id="driverNameDisp">READY</div>
    <button id="stintBtn" onclick="handleStintLogic()">START STINT</button>

    <script>
        // ΠΡΟΕΠΙΛΟΓΗ: aston kartin (σε lower case για την αναζήτηση)
        let trackName = "speedforce2", searchTerm = "aston kartin", currentMode = ""; 
        const PROXY_URL = "https://corsproxy.io/?";
        let stintStatus = "stopped", startTime = 0, elapsedTime = 0, timerInterval = null;
        let lastGapAheadVal = null, lastGapBehindVal = null, wakeLock = null;

        // Όλα τα ονόματα στις επιλογές μετατρέπονται σε lower case
        const options = {
            track: ["speedforce2", "megarakartingcircuit"],
            team: ["aston kartin", "kappis evangelos", "kappis vaggelis", "kappis charalampos"]
        };

        function openModal(mode) {
            currentMode = mode;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = "";
            options[mode].forEach(opt => {
                let b = document.createElement('button');
                b.className = "option-btn";
                // Εμφάνιση σε Uppercase για το UI, αλλά η τιμή είναι lowercase
                b.innerText = opt.toUpperCase();
                b.onclick = () => selectOption(opt);
                container.appendChild(b);
            });
            document.getElementById('modalOverlay').style.display = "flex";
        }

        function selectOption(val) {
            const cleanVal = val.toLowerCase().trim();
            if (currentMode === 'track') { 
                trackName = cleanVal; 
                document.getElementById('trackSelect').innerText = "Track: " + cleanVal; 
            } else { 
                searchTerm = cleanVal; 
                document.getElementById('teamSelect').innerText = val.toUpperCase(); 
            }
            closeModal();
        }

        function saveCustom() {
            const val = document.getElementById('customInput').value;
            if (val.trim()) selectOption(val);
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = "none"; }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        document.getElementById('startDashBtn').addEventListener('click', function() {
            document.getElementById('config').style.display = "none";
            document.getElementById('stintBtn').style.display = "block";
            requestWakeLock();
            updateData();
            setInterval(updateData, 2000);
        });

        function handleStintLogic() {
            const btn = document.getElementById('stintBtn');
            if (stintStatus === "stopped") {
                startTime = Date.now(); stintStatus = "running";
                btn.innerText = "PAUSE"; btn.style.background = "#fd7e14";
                timerInterval = setInterval(() => {
                    const totalMs = elapsedTime + (Date.now() - startTime);
                    const totalSecs = Math.floor(totalMs / 1000);
                    const mins = Math.floor(totalSecs / 60).toString().padStart(2, '0');
                    const secs = (totalSecs % 60).toString().padStart(2, '0');
                    document.getElementById('stintTimer').innerText = `${mins}:${secs}`;
                }, 1000);
            } else if (stintStatus === "running") {
                stintStatus = "paused"; elapsedTime += Date.now() - startTime;
                clearInterval(timerInterval);
                btn.innerText = "RESET"; btn.style.background = "#dc3545";
            } else if (stintStatus === "paused") {
                stintStatus = "stopped"; startTime = 0; elapsedTime = 0;
                document.getElementById('stintTimer').innerText = "00:00";
                btn.innerText = "START STINT"; btn.style.background = "#007bff";
            }
        }

        async function updateData() {
            const targetUrl = `https://live.racefacer.com/ajax/live-data?slug=${trackName}&nocache=${Date.now()}`;
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(targetUrl));
                const data = await response.json();
                const runners = data.data.runs;
                
                // Διπλή αναζήτηση σε team και name με lowercase match
                const myIndex = runners.findIndex(p => {
                    const apiName = (p.name || "").toLowerCase();
                    const apiTeam = (p.team || "").toLowerCase();
                    return apiName.includes(searchTerm) || apiTeam.includes(searchTerm);
                });

                if (myIndex !== -1) {
                    const myData = runners[myIndex];
                    document.getElementById('lastTime').innerText = myData.last_time || "0.000";
                    document.getElementById('posDisp').innerText = `P${myIndex + 1}`;
                    document.getElementById('driverNameDisp').innerText = myData.team ? `${myData.team} - ${myData.name}` : myData.name;
                    updateGaps(runners, myIndex, myData);
                }
            } catch (e) {}
        }

        function updateGaps(runners, myIndex, myData) {
            const gapAheadEl = document.getElementById('gapAhead');
            if (myIndex > 0) {
                const ahead = runners[myIndex - 1];
                let diff = (myData.int && myData.int !== "-") ? parseFloat(myData.int.replace('+', '')) : Math.abs(myData.last_passing - ahead.last_passing) / 1000;
                if (diff > 120 || parseInt(ahead.total_laps) > parseInt(myData.total_laps)) {
                    gapAheadEl.innerText = `+${parseInt(ahead.total_laps) - parseInt(myData.total_laps)} LAP`;
                } else {
                    gapAheadEl.innerText = "+" + diff.toFixed(2);
                    if (lastGapAheadVal !== null) gapAheadEl.style.color = diff < lastGapAheadVal ? "#28a745" : "#ffc107";
                    lastGapAheadVal = diff;
                }
            } else { gapAheadEl.innerText = "LEADER"; gapAheadEl.style.color = "#fff"; }

            const gapBehindEl = document.getElementById('gapBehind');
            if (myIndex < runners.length - 1) {
                const behind = runners[myIndex + 1];
                let diff = (behind.int && behind.int !== "-") ? parseFloat(behind.int.replace('+', '')) : Math.abs(behind.last_passing - myData.last_passing) / 1000;
                if (diff > 120 || parseInt(myData.total_laps) > parseInt(behind.total_laps)) {
                    gapBehindEl.innerText = `+${parseInt(myData.total_laps) - parseInt(behind.total_laps)} LAP`;
                } else {
                    gapBehindEl.innerText = "+" + diff.toFixed(2);
                    if (lastGapBehindVal !== null) gapBehindEl.style.color = diff > lastGapBehindVal ? "#28a745" : "#ffc107";
                    lastGapBehindVal = diff;
                }
            } else { gapBehindEl.innerText = "LAST"; gapBehindEl.style.color = "#fff"; }
        }
    </script>
</body>
</html>
