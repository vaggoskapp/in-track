<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aston Kartin Dash Fix</title>
    <style>
        body, html { background-color: #0d0e10; color: #ffffff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #setup { display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 350px; background: #1a1c1e; padding: 25px; border-radius: 15px; border-left: 5px solid #29abe1; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; font-size: 1rem; }
        button { padding: 18px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #dash { display: none; width: 100vw; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #lastTime { font-size: 38vw; font-weight: 900; line-height: 0.8; margin: 0; color: #28a745; }
        .status-badge { padding: 8px 20px; border-radius: 30px; font-size: 4vw; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; background: #444; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 90%; margin-top: 20px; }
        .val { color: #fff; font-weight: bold; display: block; font-size: 8vw; }
        .label-text { color: #666; font-size: 3vw; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="setup">
        <h2 style="color:#29abe1; text-align:center;">🏁 STRATEGY HUB</h2>
        <input type="text" id="trackSlug" value="sofiakarting">
        <input type="text" id="driverName" value="Aston Kartin">
        <button onclick="startTracking()">START LIVE DASH</button>
    </div>

    <div id="dash">
        <div id="status" class="status-badge">CONNECTING...</div>
        <div id="lastTime">--.---</div>
        <div class="info-grid">
            <div><span class="label-text">Best Lap</span><span id="bestTime" class="val">--.---</span></div>
            <div><span class="label-text">Position</span><span id="pos" class="val">-</span></div>
        </div>
    </div>

    <script>
        let targetName = "";
        let trackSlug = "";
        
        // ΑΛΛΑΓΗ PROXY: Χρησιμοποιούμε τον CORSProxy.io που είναι πιο σταθερός
        const proxy = "https://corsproxy.io/?";

        async function updateDashboard() {
            const apiUrl = `https://live.racefacer.com/ajax/live-data?slug=${trackSlug}`;
            
            try {
                // Προσθέτουμε ένα timestamp στο τέλος για να μην παίρνουμε παλιά δεδομένα (cache)
                const finalUrl = proxy + encodeURIComponent(apiUrl + "&t=" + Date.now());
                
                const response = await fetch(finalUrl);
                const data = await response.json();
                
                if (data && data.data && data.data.runs) {
                    const participants = data.data.runs;
                    const myData = participants.find(p => {
                        const n = p.name.toLowerCase();
                        const t = targetName.toLowerCase().trim();
                        return n.includes(t) || p.kart === t;
                    });

                    const timeEl = document.getElementById('lastTime');
                    const statusEl = document.getElementById('status');

                    if (myData) {
                        timeEl.innerText = myData.last_time || "0.000";
                        document.getElementById('bestTime').innerText = myData.best_time || "--.---";
                        document.getElementById('pos').innerText = myData.pos || "-";

                        const isPit = myTeamInPit(myData);
                        statusEl.innerText = isPit ? "🔴 IN PIT" : "🟢 TRACK LIVE";
                        statusEl.style.background = isPit ? "#dc3545" : "#28a745";
                        timeEl.style.color = isPit ? "#444" : "#28a745";
                    } else {
                        statusEl.innerText = "SEARCHING FOR " + targetName.toUpperCase();
                        statusEl.style.background = "#444";
                    }
                } else {
                    document.getElementById('status').innerText = "NO ACTIVE SESSION";
                }
            } catch (e) {
                document.getElementById('status').innerText = "SYNC ERROR - RETRYING...";
            }
        }

        function myTeamInPit(p) {
            return p.in_pit || String(p.run_status).toLowerCase() === 'pit';
        }

        function startTracking() {
            targetName = document.getElementById('driverName').value;
            trackSlug = document.getElementById('trackSlug').value;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('dash').style.display = 'flex';
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
            setInterval(updateDashboard, 2500);
            updateDashboard();
        }
    </script>
</body>
</html>
