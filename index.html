<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aston Kartin Dash - Final</title>
    <style>
        body, html {
            background-color: #000; color: #fff; margin: 0; padding: 0;
            height: 100%; width: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Arial Black', sans-serif; overflow: hidden;
        }

        #config {
            position: absolute; top: 0; width: 100%; background: #111; padding: 10px;
            display: flex; justify-content: center; gap: 8px; z-index: 100;
        }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; width: 90px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* ΣΤΑΘΕΡΟ ΜΕΓΕΘΟΣ ΓΙΑ 5-7 ΨΗΦΙΑ */
        #lastTime {
            font-size: 24vw; /* Σταθερό πλάτος για να χωράει το 1:00.000 */
            line-height: 1; margin: 0; color: #28a745;
            white-space: nowrap; letter-spacing: -2px;
        }

        #status { font-size: 5vw; text-transform: uppercase; color: #444; margin-bottom: 0; }
        #driverNameDisp { position: absolute; bottom: 20px; font-size: 4vw; color: #333; text-transform: uppercase; }

        @media screen and (orientation: landscape) {
            #lastTime { font-size: 50vh; } /* Σταθερό ύψος για οριζόντια οθόνη */
        }
    </style>
</head>
<body>

    <div id="config">
        <input type="text" id="track" value="speedforce">
        <input type="text" id="team" value="Aston Kartin">
        <button id="startBtn">START DASH</button>
    </div>

    <div id="status">READY</div>
    <div id="lastTime">00.000</div>
    <div id="driverNameDisp">---</div>

    <video id="noSleepVideo" loop playsinline muted style="position:absolute; width:1px; height:1px; opacity:0.01;">
        <source src="https://raw.githubusercontent.com/anars/NoSleep.js/master/media/blank.mp4" type="video/mp4">
    </video>

    <script>
        let trackName = "speedforce";
        let teamName = "Aston Kartin";
        const PROXY_URL = "https://corsproxy.io/?";
        const video = document.getElementById('noSleepVideo');
        let wakeLock = null;

        // Λειτουργία για Wake Lock
        async function enableWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log("WakeLock Active");
                }
            } catch (err) {
                console.log("WakeLock Failed");
            }
        }

        document.getElementById('startBtn').addEventListener('click', function() {
            trackName = document.getElementById('track').value.trim();
            teamName = document.getElementById('team').value.trim();
            
            // ΕΝΕΡΓΟΠΟΙΗΣΗ ΠΡΟΣΤΑΣΙΑΣ ΟΘΟΝΗΣ
            video.play(); // Το βίντεο "ξεγελάει" το σύστημα
            enableWakeLock(); // Το API κλειδώνει την οθόνη
            
            document.getElementById('config').style.display = "none";
            document.getElementById('startBtn').style.backgroundColor = "#555";
            
            update();
            setInterval(update, 1500);
        });

        // Αν ο χρήστης βγει και ξαναμπεί στον browser, ξανακλείδωσε την οθόνη
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && trackName !== "") {
                enableWakeLock();
                video.play();
            }
        });

        async function update() {
            const timestamp = Date.now();
            const targetUrl = `https://live.racefacer.com/ajax/live-data?slug=${trackName}&nocache=${timestamp}`;
            const finalUrl = `${PROXY_URL}${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(finalUrl);
                const data = await response.json();
                const myData = data.data.runs.find(p => p.name.toLowerCase().includes(teamName.toLowerCase()));

                if (myData) {
                    const timeEl = document.getElementById('lastTime');
                    timeEl.innerText = myData.last_time || "0.000";
                    document.getElementById('driverNameDisp').innerText = myData.name;
                    
                    const isPit = myData.in_pit || String(myData.run_status).toLowerCase() === 'pit';
                    document.getElementById('status').innerText = isPit ? "IN PIT" : "LIVE LAP";
                    timeEl.style.color = isPit ? "#333" : "#28a745";
                }
            } catch (e) {
                document.getElementById('status').innerText = "RECONNECTING...";
            }
        }
    </script>
</body>
</html>
