<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kart Minimal Dash</title>
    <style>
        /* Βασικό στυλ: Μαύρο φόντο και κεντράρισμα */
        body, html {
            background-color: #000;
            color: #00ff00; /* Πράσινο "matrix" */
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #setup { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            z-index: 10;
        }
        input { padding: 15px; font-size: 1.2rem; border-radius: 8px; border: none; text-align: center; }
        button { padding: 15px; font-size: 1.2rem; background: #29abe1; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Το Dashboard που δείχνει ΜΟΝΟ τον χρόνο */
        #dash {
            display: none;
            width: 100vw;
            height: 100vh;
            text-align: center;
        }

        /* Ο χρόνος θα παίρνει όλο το διαθέσιμο ύψος/πλάτος */
        #lastTime {
            font-size: 35vw; /* Πολύ μεγάλο μέγεθος βάσει πλάτους */
            line-height: 100vh; /* Κεντράρισμα καθ' ύψος */
            white-space: nowrap;
        }

        /* Ρύθμιση για όταν γυρνάει το κινητό πλάγια (Landscape) */
        @media screen and (orientation: landscape) {
            #lastTime {
                font-size: 45vh; /* Ακόμα μεγαλύτερο όταν είναι πλάγια */
            }
        }
    </style>
</head>
<body>

    <div id="setup">
        <input type="text" id="driverName" placeholder="Όνομα Οδηγού" value="Markos Saridis">
        <button onclick="startTracking()">START TRACKING</button>
    </div>

    <div id="dash">
        <div id="lastTime">--.---</div>
    </div>

    <script>
        let targetName = "";
        const apiUrl = "https://live.racefacer.com/ajax/live-data?slug=speedforce2";
        const proxy = "https://api.allorigins.win/get?url=";

        async function fetchData() {
            try {
                const response = await fetch(proxy + encodeURIComponent(apiUrl));
                const json = await response.json();
                const data = JSON.parse(json.contents);
                
                const myRun = data.data.runs.find(r => r.name.toLowerCase().includes(targetName.toLowerCase()));

                if (myRun) {
                    // Δείχνουμε μόνο το last_time
                    document.getElementById('lastTime').innerText = myRun.last_time;
                }
            } catch (e) {
                console.error("Error fetching data", e);
            }
        }

        function startTracking() {
            targetName = document.getElementById('driverName').value;
            if(!targetName) return alert("Βάλε όνομα!");
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('dash').style.display = 'flex'; // Χρήση flex για κεντράρισμα
            
            // Κρατάμε την οθόνη ανοιχτή
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(console.error);
            }

            // Ανανέωση κάθε 2 δευτερόλεπτα για μεγαλύτερη ταχύτητα
            setInterval(fetchData, 2000);
            fetchData();
        }
    </script>
</body>
</html>
