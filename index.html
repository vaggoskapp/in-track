<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aston Kartin Dash - Custom Options</title>
    <style>
        body, html { background-color: #000; color: #fff; margin: 0; padding: 0; height: 100%; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #config { position: absolute; top: 0; width: 100%; background: #111; padding: 10px; display: flex; justify-content: center; gap: 8px; z-index: 200; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 130px; font-size: 14px; }
        .btn { border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #stintBox { position: absolute; top: 50px; left: 15px; text-align: left; z-index: 10; }
        #stintTimer { font-size: 25px; color: #ffc107; font-family: 'monospace'; }
        #posDisp { position: absolute; top: 45px; right: 15px; font-size: 40px; color: #fff; opacity: 0.4; }
        .gap { font-size: 9vw; font-family: 'Courier New', monospace; font-weight: bold; transition: color 0.3s; }
        #gapAhead { color: #666; } #gapBehind { color: #666; }
        #lastTime { font-size: 32vw; line-height: 0.85; margin: 0; color: #28a745; white-space: nowrap; letter-spacing: -3px; }
        #driverNameDisp { position: absolute; bottom: 10px; left: 15px; font-size: 12px; color: #444; }
        #stintBtn { position: absolute; bottom: 15px; right: 15px; background: #007bff; color: #fff; font-size: 14px; border: none; display: none; z-index: 101; padding: 15px 25px; border-radius: 8px; }
        
        @media screen and (orientation: landscape) { 
            #lastTime { font-size: 52vh; } 
            .gap { font-size: 12vh; } 
            #stintTimer { font-size: 10vh; } 
            #posDisp { font-size: 12vh; } 
        }
    </style>
</head>
<body>

    <div id="config">
        <!-- Track Selection -->
        <input type="text" id="track" list="trackOptions" placeholder="Track" value="speedforce2">
        <datalist id="trackOptions">
            <option value="speedforce2">Speedforce (Aspropyrgos)</option>
            <option value="megarakartingcircuit">Megara Karting Circuit</option>
        </datalist>

        <!-- Team/Driver Selection -->
        <input type="text" id="team" list="teamOptions" placeholder="Driver/Team">
        <datalist id="teamOptions">
            <option value="KAPPIS EVANGELOS">
            <option value="KAPPIS VAGGELIS">
            <option value="KAPPIS CHARALAMPOS">
            <option value="KAPPIS HARALAMPOS">
            <option value="Haralampos Kappis">
            <option value="Charalampos Kappis">
        </datalist>

        <button id="startDashBtn" class="btn" style="background:#28a745; color:white;">START</button>
    </div>

    <div id="stintBox">
        <div style="font-size:12px; color:#444;">STINT TIME</div>
        <div id="stintTimer">00:00</div>
    </div>

    <div id="posDisp">P--</div>

    <div id="dashContainer" style="display:flex; flex-direction:column; align-items:center;">
        <div id="gapAhead" class="gap">--.--</div>
        <div id="lastTime">00.000</div>
        <div id="gapBehind" class="gap">--.--</div>
    </div>

    <div id="driverNameDisp">---</div>
    
    <button id="stintBtn" class="btn" onclick="handleStintLogic()">START STINT</button>

    <script>
        let trackName = ""; 
        let teamName = ""; 
        const PROXY_URL = "https://corsproxy.io/?";
        let stintStatus = "stopped"; 
        let startTime = 0; 
        let elapsedTime = 0; 
        let timerInterval = null;
        let lastGapAheadVal = null; 
        let lastGapBehindVal = null;
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('Wake Lock Error: ' + err.message);
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        document.getElementById('startDashBtn').addEventListener('click', function() {
            trackName = document.getElementById('track').value.trim();
            teamName = document.getElementById('team').value.trim();
            
            if(!trackName || !teamName) {
                alert("Συμπλήρωσε Track και Team!");
                return;
            }

            document.getElementById('config').style.display = "none";
            document.getElementById('stintBtn').style.display = "block";
            
            requestWakeLock();
            updateData();
            setInterval(updateData, 2000);
        });

        function handleStintLogic() {
            const btn = document.getElementById('stintBtn');
            if (stintStatus === "stopped") {
                startTime = Date.now(); stintStatus = "running";
                btn.innerText = "PAUSE"; btn.style.background = "#fd7e14";
                timerInterval = setInterval(() => {
                    const totalMs = elapsedTime + (Date.now() - startTime);
                    const totalSecs = Math.floor(totalMs / 1000);
                    const mins = Math.floor(totalSecs / 60).toString().padStart(2, '0');
                    const secs = (totalSecs % 60).toString().padStart(2, '0');
                    document.getElementById('stintTimer').innerText = `${mins}:${secs}`;
                }, 1000);
            } else if (stintStatus === "running") {
                stintStatus = "paused"; elapsedTime += Date.now() - startTime;
                clearInterval(timerInterval);
                btn.innerText = "RESET TO 0"; btn.style.background = "#dc3545";
            } else if (stintStatus === "paused") {
                stintStatus = "stopped"; startTime = 0; elapsedTime = 0;
                document.getElementById('stintTimer').innerText = "00:00";
                btn.innerText = "START STINT"; btn.style.background = "#007bff";
            }
        }

        async function updateData() {
            const timestamp = Date.now();
            const targetUrl = `https://live.racefacer.com/ajax/live-data?slug=${trackName}&nocache=${timestamp}`;
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(targetUrl));
                const data = await response.json();
                const runners = data.data.runs;
                const myIndex = runners.findIndex(p => p.name.toLowerCase().includes(teamName.toLowerCase()));

                if (myIndex !== -1) {
                    const myData = runners[myIndex];
                    document.getElementById('lastTime').innerText = myData.last_time || "0.000";
                    document.getElementById('posDisp').innerText = `P${myIndex + 1}`;
                    document.getElementById('driverNameDisp').innerText = myData.name;

                    const gapAheadEl = document.getElementById('gapAhead');
                    if (myIndex > 0) {
                        const aheadData = runners[myIndex - 1];
                        let diffA;
                        if (myData.int && myData.int !== "-") {
                            diffA = parseFloat(myData.int.replace('+', ''));
                        } else {
                            diffA = Math.abs(myData.last_passing - aheadData.last_passing) / 1000;
                        }

                        if (diffA > 120 || (parseInt(aheadData.total_laps) > parseInt(myData.total_laps))) {
                            gapAheadEl.innerText = `+${parseInt(aheadData.total_laps) - parseInt(myData.total_laps)} LAP`;
                        } else {
                            gapAheadEl.innerText = "+" + diffA.toFixed(2);
                            if (lastGapAheadVal !== null) gapAheadEl.style.color = diffA < lastGapAheadVal ? "#28a745" : "#ffc107";
                            lastGapAheadVal = diffA;
                        }
                    } else { gapAheadEl.innerText = "LEADER"; gapAheadEl.style.color = "#fff"; }

                    const gapBehindEl = document.getElementById('gapBehind');
                    if (myIndex < runners.length - 1) {
                        const behindData = runners[myIndex + 1];
                        let diffB;
                        if (behindData.int && behindData.int !== "-") {
                            diffB = parseFloat(behindData.int.replace('+', ''));
                        } else {
                            diffB = Math.abs(behindData.last_passing - myData.last_passing) / 1000;
                        }

                        if (diffB > 120 || (parseInt(myData.total_laps) > parseInt(behindData.total_laps))) {
                            gapBehindEl.innerText = `+${parseInt(myData.total_laps) - parseInt(behindData.total_laps)} LAP`;
                        } else {
                            gapBehindEl.innerText = "+" + diffB.toFixed(2);
                            if (lastGapBehindVal !== null) gapBehindEl.style.color = diffB > lastGapBehindVal ? "#28a745" : "#ffc107";
                            lastGapBehindVal = diffB;
                        }
                    } else { gapBehindEl.innerText = "LAST"; gapBehindEl.style.color = "#fff"; }
                }
            } catch (e) { console.log("API Error"); }
        }
    </script>
</body>
</html>
